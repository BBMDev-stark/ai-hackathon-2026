<svg xmlns="http://www.w3.org/2000/svg" width="600" height="480" viewBox="0 0 600 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04);stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="480" fill="url(#bg)" rx="24"/>
  <!-- Grid lines -->
  <line x1="0" y1="120" x2="600" y2="120" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="240" x2="600" y2="240" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="360" x2="600" y2="360" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <line x1="120" y1="0" x2="120" y2="480" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <line x1="240" y1="0" x2="240" y2="480" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <line x1="360" y1="0" x2="360" y2="480" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <line x1="480" y1="0" x2="480" y2="480" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <!-- Decorative circles -->
  <circle cx="300" cy="240" r="160" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>
  <circle cx="300" cy="240" r="200" fill="none" stroke="white" stroke-width="1" opacity="0.05"/>
  <!-- Central icon area -->
  <circle cx="300" cy="220" r="80" fill="white" opacity="0.08"/>
  <circle cx="300" cy="220" r="55" fill="white" opacity="0.1"/>
  <text x="300" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="40" fill="white" opacity="0.8">AI</text>
  <text x="300" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="white" opacity="0.6">AI Discovery Hackathon</text>
  <text x="300" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="white" opacity="0.4">Trường Đại học Lạc Hồng • 2026</text>
</svg>